<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Laurel wreath - left side -->
  <g fill="#f59e0b">
    <!-- Left laurel leaves -->
    <ellipse cx="28" cy="100" rx="10" ry="6" transform="rotate(-30 28 100)"/>
    <ellipse cx="22" cy="82" rx="10" ry="6" transform="rotate(-50 22 82)"/>
    <ellipse cx="24" cy="63" rx="10" ry="6" transform="rotate(-70 24 63)"/>
    <ellipse cx="33" cy="47" rx="10" ry="6" transform="rotate(-85 33 47)"/>
    <ellipse cx="47" cy="35" rx="10" ry="6" transform="rotate(-100 47 35)"/>
    <ellipse cx="64" cy="27" rx="10" ry="6" transform="rotate(-115 64 27)"/>
    <ellipse cx="32" cy="118" rx="10" ry="6" transform="rotate(-15 32 118)"/>
    <ellipse cx="40" cy="134" rx="10" ry="6" transform="rotate(0 40 134)"/>
  </g>
  <!-- Laurel wreath - right side -->
  <g fill="#f59e0b">
    <ellipse cx="172" cy="100" rx="10" ry="6" transform="rotate(30 172 100)"/>
    <ellipse cx="178" cy="82" rx="10" ry="6" transform="rotate(50 178 82)"/>
    <ellipse cx="176" cy="63" rx="10" ry="6" transform="rotate(70 176 63)"/>
    <ellipse cx="167" cy="47" rx="10" ry="6" transform="rotate(85 167 47)"/>
    <ellipse cx="153" cy="35" rx="10" ry="6" transform="rotate(100 153 35)"/>
    <ellipse cx="136" cy="27" rx="10" ry="6" transform="rotate(115 136 27)"/>
    <ellipse cx="168" cy="118" rx="10" ry="6" transform="rotate(15 168 118)"/>
    <ellipse cx="160" cy="134" rx="10" ry="6" transform="rotate(0 160 134)"/>
  </g>
  <!-- Bottom bow of wreath -->
  <ellipse cx="100" cy="148" rx="12" ry="7" fill="#f59e0b"/>
  <ellipse cx="82" cy="146" rx="11" ry="6" fill="#f59e0b" transform="rotate(20 82 146)"/>
  <ellipse cx="118" cy="146" rx="11" ry="6" fill="#f59e0b" transform="rotate(-20 118 146)"/>

  <!-- Shield/Circle background -->
  <circle cx="100" cy="85" r="58" fill="#1e3a8a" stroke="#f59e0b" stroke-width="3"/>

  <!-- UPB text -->
  <text x="100" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="40" fill="white" letter-spacing="2">UPB</text>

  <!-- University name below -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#1e3a8a" letter-spacing="3">UNIVERSITÉ</text>
  <text x="100" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="8" fill="#64748b" letter-spacing="2">POLYTECHNIQUE DE</text>
  <text x="100" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#1e3a8a" letter-spacing="2">BINGERVILLE</text>
</svg>
